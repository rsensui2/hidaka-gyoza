# ひだかや ランディングページ要件定義

project:
  name: ひだかや
  repo: hidaka-gyoza
  description: 餃子専門店「ひだかや」のブランド LP。店内飲食とお取り寄せ餃子を訴求する。
  stack:
    - Next.js (App Router)
    - TypeScript
    - Tailwind CSS
    - Resend（問い合わせメール送信）
  deploy: Vercel

pages:
  - path: /
    type: landing
    purpose: ブランド認知・来店誘導・お取り寄せ導線

sections:
  - id: hero
    required: true
    content:
      - brand: ひだかや
      - headline: 一粒に、職人の火入れ。
      - support: 焼き立ての香ばしさと、ご自宅で楽しむお取り寄せ餃子。
      - cta:
          - label: お取り寄せを見る
            href: "#order"
          - label: 店舗情報
            href: "#store"
      - visual: フルブリードの餃子ヒーロー画像

  - id: craft
    required: true
    purpose: こだわり・製法の紹介

  - id: products
    required: true
    purpose: 看板メニューとお取り寄せ商品の紹介

  - id: order
    required: true
    purpose: お取り寄せの流れと問い合わせ導線

  - id: contact
    required: true
    purpose: シンプルな問い合わせフォーム（氏名・メール・内容）
    behavior:
      - Resend で店舗へ通知メールを送信（replyTo はお客様のメール）
      - Resend でお客様へ受付完了の自動返信を送信
      - サーバー側で入力バリデーション

  - id: store
    required: true
    purpose: 店舗情報・営業時間・アクセス

  - id: footer
    required: true

env:
  - RESEND_API_KEY
  - CONTACT_TO_EMAIL
  - RESEND_FROM_EMAIL

constraints:
  - 要件にない機能（決済・会員・CMS・カート実装など）は実装しない
  - レスポンシブ対応（モバイル / デスクトップ）
  - Docker でローカル起動可能であること
  - API キーは環境変数のみ（コミット禁止）

out_of_scope:
  - オンライン決済
  - 在庫管理
  - 管理画面
  - 多言語対応
  - 問い合わせ履歴の DB 保存
